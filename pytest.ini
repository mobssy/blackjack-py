# JackPy - pytest 설정

[pytest]
# 테스트 디렉토리
testpaths = tests

# 테스트 파일 패턴
python_files = test_*.py

# 테스트 클래스 패턴
python_classes = Test*

# 테스트 함수 패턴
python_functions = test_*

# 최소 Python 버전
minversion = 7.0

# 추가 옵션
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# 마커 정의
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests

# Coverage 설정
[coverage:run]
source = bot,models
omit =
    */tests/*
    */venv/*
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
